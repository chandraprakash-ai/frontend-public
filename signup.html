<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Skin Assist - Sign Up</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ecec",
                        "background-light": "#f6f8f8",
                        "background-dark": "#102222",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex justify-center items-center p-4">
<!-- Mobile Container -->
<div class="relative w-full max-w-[390px] h-[844px] bg-white dark:bg-slate-900 rounded-[3rem] shadow-2xl border-[8px] border-slate-200 dark:border-slate-800 flex flex-col overflow-hidden">
<!-- Background Image with Overlay -->
<div class="absolute inset-0 z-0">
<div class="absolute inset-0 bg-cover bg-center" data-alt="Clean abstract skincare cream texture" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuC-qGKMhX91TNNlQrIAJyP9PAYMWMqZLxNv-uXGfAAXg33bPoEE-LDO-75Z6uk_FFIHHe2uo5MaMKOSyqYVZuIvnj0THgIWLSrTDZwGXiMbkbQmu5nL7voO9TGkE79kAawW0KBkAlqWhMO_NcVB7C85r36YIpSPyVIE1fNSWQVX2Tdm6pdCUeSmCkCEd8L58PgucweqpzL6UKMbSbPyBPY_MimfUGQE1JPoAUpS2qTk0ywNAo1VlTZ7ANRwK8fjWB7FB6punHMWanuR');"></div>
<!-- Gradient Overlay to ensure text readability -->
<div class="absolute inset-0 bg-gradient-to-b from-background-dark/40 via-background-dark/80 to-background-dark"></div>
</div>
<!-- Content -->
<div class="relative z-10 flex flex-col h-full p-6">
<!-- Header section -->
<div class="flex flex-col items-center mt-12 mb-8">
<div class="w-16 h-16 rounded-2xl bg-primary/20 flex items-center justify-center mb-4 backdrop-blur-sm border border-primary/30">
<span class="material-symbols-outlined text-primary text-3xl">spa</span>
</div>
<h1 class="text-3xl font-bold tracking-tight text-white mb-2">Skin Assist</h1>
<p class="text-slate-300 text-sm text-center px-4">Create an account to start tracking your skin health journey.</p>
</div>
<!-- Form Area -->
<div class="flex-1 flex flex-col gap-5 justify-center mt-4">
<label class="flex flex-col w-full">
<p class="text-slate-200 text-sm font-medium leading-normal pb-1.5 px-1">Full Name</p>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-slate-400 text-xl pointer-events-none">person</span>
<input class="form-input flex w-full flex-1 resize-none overflow-hidden rounded-xl text-white focus:outline-0 focus:ring-0 border border-white/10 bg-white/5 backdrop-blur-md focus:border-primary focus:bg-white/10 transition-colors h-14 placeholder:text-slate-500 pl-12 pr-4 text-base font-normal shadow-sm" placeholder="John Doe" type="text" value=""/>
</div>
</label>
<label class="flex flex-col w-full">
<p class="text-slate-200 text-sm font-medium leading-normal pb-1.5 px-1">Email Address</p>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-slate-400 text-xl pointer-events-none">mail</span>
<input class="form-input flex w-full flex-1 resize-none overflow-hidden rounded-xl text-white focus:outline-0 focus:ring-0 border border-white/10 bg-white/5 backdrop-blur-md focus:border-primary focus:bg-white/10 transition-colors h-14 placeholder:text-slate-500 pl-12 pr-4 text-base font-normal shadow-sm" placeholder="john@example.com" type="email" value=""/>
</div>
</label>
<label class="flex flex-col w-full">
<p class="text-slate-200 text-sm font-medium leading-normal pb-1.5 px-1">Password</p>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-slate-400 text-xl pointer-events-none">lock</span>
<input class="form-input flex w-full flex-1 resize-none overflow-hidden rounded-xl text-white focus:outline-0 focus:ring-0 border border-white/10 bg-white/5 backdrop-blur-md focus:border-primary focus:bg-white/10 transition-colors h-14 placeholder:text-slate-500 pl-12 pr-12 text-base font-normal shadow-sm" placeholder="Create a strong password" type="password" value=""/>
<button class="absolute right-4 text-slate-400 hover:text-white transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility_off</span>
</button>
</div>
</label>
</div>
<!-- Bottom Action Area -->
<div class="flex flex-col items-center mt-8 mb-6 gap-6">
<button onclick="window.location.href='home.html'" class="w-full h-14 flex items-center justify-center rounded-xl bg-primary text-background-dark font-semibold text-lg shadow-[0_4px_14px_0_rgba(19,236,236,0.39)] hover:bg-primary/90 hover:shadow-[0_6px_20px_rgba(19,236,236,0.23)] transition-all active:scale-[0.98]">
                    Sign Up
                </button>
<p class="text-slate-400 text-sm">
                    Already have an account? 
                    <a class="text-primary font-medium hover:underline underline-offset-4" href="login.html">Login</a>
</p>
</div>
</div>
</div>
</body></html>
