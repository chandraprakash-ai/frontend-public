<script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#7C3AED", // A vibrant purple similar to the reference image
              "background-light": "#F9FAFB",
              "background-dark": "#0F172A",
            },

<style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .camera-viewfinder {
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(124, 58, 237, 0.3);
        }
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(to right, transparent, #7C3AED, transparent);
            animation: scan 3s linear infinite;
            z-index: 10;
        }
        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }
        .guide-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 80%;
            border: 2px dashed rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            pointer-events: none;
        }
        .ios-notch {
            width: 160px;
            height: 30px;
            background: black;
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 15px;
            margin: 0 auto;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
